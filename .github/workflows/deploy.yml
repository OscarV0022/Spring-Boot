name: CD - Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Application
    runs-on: self-hosted 
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Pull Image and Run
        env:
          REGISTRY_IP: ${{ secrets.REGISTRY_IP }}
        run: |
          docker compose pull
          docker compose up -d