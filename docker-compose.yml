version: '3.8'
services:
  app-spring:
    image: ${REGISTRY_IP}:5000/mi-app-spring:latest
    ports:
      - "80:8080"
    restart: always

db-postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: admin_password

adminer:
    image: adminer
    ports:
      - "8081:8080"
    restart: always